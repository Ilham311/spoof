name: Build and Release Magisk Module

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'module.prop'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Install dependencies
        run: sudo apt-get install -y ninja-build

      - name: Build Zygisk module
        run: |
          export NDK_HOME=${ANDROID_NDK_HOME}
          ./sources/build.sh

      - name: Get Version info
        id: get_version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2 | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          VERSION_CODE=$(grep '^versionCode=' module.prop | cut -d'=' -f2 | tr -d '\r')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Update update.json
        run: |
          cat > update.json <<EOF
          {
            "version": "${{ steps.get_version.outputs.VERSION }}",
            "versionCode": ${{ steps.get_version.outputs.VERSION_CODE }},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/latest/download/ternak_device_changer_${{ steps.get_version.outputs.VERSION }}.zip",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/CHANGELOG.md"
          }
          EOF
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update update.json for ${{ steps.get_version.outputs.VERSION }} [skip ci]" && git push)

      - name: Create Zip Archive
        run: |
          cp -r webroot module/ || true
          cp -r bin module/ || true
          cp ternak_core_v4.sh module/ || true
          cp post-fs-data.sh module/ || true
          cp action.sh module/ || true
          cp module.prop module/ || true
          ZIP_NAME="ternak_device_changer_${{ steps.get_version.outputs.VERSION }}.zip"
          cd module
          zip -r "../$ZIP_NAME" .
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
