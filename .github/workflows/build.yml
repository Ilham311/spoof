name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Install dependencies
        run: sudo apt-get install -y ninja-build

      - name: Build Zygisk module
        run: |
          export NDK_HOME=${ANDROID_NDK_HOME}
          ./sources/build.sh

      - name: Verify build outputs
        run: |
          ls -lh module/zygisk/*.so
          file module/zygisk/*.so

      - name: Pack module
        run: |
          cp -r webroot module/ || true
          cp -r bin module/ || true
          cp ternak_core_v4.sh module/ || true
          cp post-fs-data.sh module/ || true
          cp action.sh module/ || true
          cd module
          zip -r ../ternak_device_changer-${{ github.sha }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ternak_device_changer
          path: ternak_device_changer-${{ github.sha }}.zip
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ternak_device_changer-${{ github.sha }}.zip
          generate_release_notes: true
