name: Build Dynamic Environment ZYGISK

on:
  push:
    branches: [main]
    paths:
      - module.prop
      - update.json
      - jni/**
      - customize.sh
      - action.sh
      - service.sh
      - pool.json
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract module version
        id: mp
        run: |
          VER=$(grep -E '^version=' module.prop | cut -d= -f2)
          CODE=$(grep -E '^versionCode=' module.prop | cut -d= -f2)
          echo "version=$VER"       >> "$GITHUB_OUTPUT"
          echo "version_code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          add-to-path: true

      - name: Download zygisk.hpp
        run: |
          mkdir -p jni
          curl -fsSL -o jni/zygisk.hpp \
            https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp

      - name: Build native (all ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -eux
          for ABI in arm64-v8a armeabi-v7a x86_64 x86; do
            BUILD_DIR="build/$ABI"
            mkdir -p "$BUILD_DIR"
            cmake -S jni -B "$BUILD_DIR" \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$ABI" \
              -DANDROID_PLATFORM=android-26 \
              -DCMAKE_BUILD_TYPE=MinSizeRel
            cmake --build "$BUILD_DIR" -j
          done

      - name: Assemble module zip
        run: |
          set -eux
          PKG="pkg"
          mkdir -p "$PKG/zygisk" "$PKG/bin"

          # Zygisk .so per ABI
          cp build/arm64-v8a/libenv.so    "$PKG/zygisk/arm64-v8a.so"
          cp build/armeabi-v7a/libenv.so  "$PKG/zygisk/armeabi-v7a.so"
          cp build/x86_64/libenv.so       "$PKG/zygisk/x86_64.so"
          cp build/x86/libenv.so          "$PKG/zygisk/x86.so"

          # envctl per ABI (customize.sh symlinks the right one at install)
          cp build/arm64-v8a/envctl       "$PKG/bin/envctl-arm64"
          cp build/armeabi-v7a/envctl     "$PKG/bin/envctl-arm"
          cp build/x86_64/envctl          "$PKG/bin/envctl-x86_64"
          cp build/x86/envctl             "$PKG/bin/envctl-x86"

          # prebuilt resetprop-rs (drop into repo/prebuilt/ manually)
          if [ -f prebuilt/resetprop-rs ]; then
            cp prebuilt/resetprop-rs      "$PKG/bin/resetprop-rs"
          else
            echo "WARN: prebuilt/resetprop-rs missing (native prop won't apply until user drops it in)"
          fi

          # Module root files (P2 verify: pool.json included)
          cp module.prop customize.sh action.sh service.sh "$PKG/"
          [ -f pool.json ]         && cp pool.json         "$PKG/"
          [ -f hook_targets.txt ]  && cp hook_targets.txt  "$PKG/"

          ZIP="env-${{ steps.mp.outputs.version }}-pure-zygisk.zip"
          (cd "$PKG" && zip -r "../$ZIP" .)
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-${{ steps.mp.outputs.version }}
          path: ${{ env.ZIP }}

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.mp.outputs.version }}
          name: ${{ steps.mp.outputs.version }}
          files: ${{ env.ZIP }}
          fail_on_unmatched_files: true
