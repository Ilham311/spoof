name: Build Ternak & Auto Release

on:
  push:
    branches: [main]
    tags: ['v*'] # Akan memicu auto-release jika ada push tag berawalan 'v' (contoh: v5.0)
  pull_request:
  workflow_dispatch:

# Wajib ditambahkan agar Actions memiliki izin untuk membuat rilis di repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          add-to-path: false

      - name: Fetch zygisk.hpp
        run: |
          curl -sSL https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp \
               -o jni/zygisk.hpp

      - name: Build for all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            echo "==> Building $abi"
            cmake -B build/$abi \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$abi \
              -DANDROID_PLATFORM=android-26 \
              -DCMAKE_BUILD_TYPE=Release \
              -S jni
            cmake --build build/$abi --parallel
          done

      - name: Assemble module zip
        env:
          # Mengambil nama tag (misal: v5.0). Jika tidak ada tag (misal dari commit biasa), pakai 'dev'
          VERSION_TAG: ${{ github.ref_name }} 
        run: |
          mkdir -p pkg/zygisk pkg/bin

          # Zygisk .so per ABI
          cp build/arm64-v8a/libternak.so   pkg/zygisk/arm64-v8a.so
          cp build/armeabi-v7a/libternak.so pkg/zygisk/armeabi-v7a.so
          cp build/x86_64/libternak.so      pkg/zygisk/x86_64.so
          cp build/x86/libternak.so         pkg/zygisk/x86.so

          # ternakctl per ABI
          cp build/arm64-v8a/ternakctl   pkg/bin/ternakctl-arm64
          cp build/armeabi-v7a/ternakctl pkg/bin/ternakctl-arm
          cp build/x86_64/ternakctl      pkg/bin/ternakctl-x86_64
          cp build/x86/ternakctl         pkg/bin/ternakctl-x86

          # Shell + install config + JSON pool
          cp module.prop action.sh service.sh customize.sh pool.json pkg/

          # resetprop-rs prebuilt
          if [ -f prebuilt/resetprop-rs ]; then
            cp prebuilt/resetprop-rs pkg/bin/
            chmod +x pkg/bin/resetprop-rs
          else
            echo "! WARNING: prebuilt/resetprop-rs missing — zip akan tanpa resetprop"
          fi

          # Buat variabel nama ZIP dinamis dan simpan ke environment variables Github
          ZIP_NAME="ternak-${VERSION_TAG}-pure-zygisk.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd pkg && zip -r "../$ZIP_NAME" .

      - name: Upload artifact (GitHub Actions Panel)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Auto Release to GitHub
        # Step ini hanya berjalan jika ada push berupa tag (misal: git tag v5.0 && git push --tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          # name: Release ${{ github.ref_name }} # Opsional: jika ingin nama rilis otomatis
