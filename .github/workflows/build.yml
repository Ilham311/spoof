name: Build Ternak & Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'module.prop' # Akan otomatis jalan dan rilis kalau kamu mengubah versi di module.prop
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mengambil versi dari module.prop seperti versi lamamu
      - name: Get Version info
        id: get_version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2 | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          add-to-path: false

      - name: Fetch zygisk.hpp
        run: |
          curl -sSL https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp \
               -o jni/zygisk.hpp

      - name: Build for all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            echo "==> Building $abi"
            cmake -B build/$abi \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$abi \
              -DANDROID_PLATFORM=android-26 \
              -DCMAKE_BUILD_TYPE=Release \
              -S jni
            cmake --build build/$abi --parallel
          done

      - name: Assemble module zip
        env:
          VERSION_TAG: ${{ steps.get_version.outputs.VERSION }} # Pakai versi dari module.prop
        run: |
          mkdir -p pkg/zygisk pkg/bin

          cp build/arm64-v8a/libternak.so   pkg/zygisk/arm64-v8a.so
          cp build/armeabi-v7a/libternak.so pkg/zygisk/armeabi-v7a.so
          cp build/x86_64/libternak.so      pkg/zygisk/x86_64.so
          cp build/x86/libternak.so         pkg/zygisk/x86.so

          cp build/arm64-v8a/ternakctl   pkg/bin/ternakctl-arm64
          cp build/armeabi-v7a/ternakctl pkg/bin/ternakctl-arm
          cp build/x86_64/ternakctl      pkg/bin/ternakctl-x86_64
          cp build/x86/ternakctl         pkg/bin/ternakctl-x86

          cp module.prop action.sh service.sh customize.sh pool.json pkg/

          if [ -f prebuilt/resetprop-rs ]; then
            cp prebuilt/resetprop-rs pkg/bin/
            chmod +x pkg/bin/resetprop-rs
          else
            echo "! WARNING: prebuilt/resetprop-rs missing — zip akan tanpa resetprop"
          fi

          ZIP_NAME="ternak-${VERSION_TAG}-pure-zygisk.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          cd pkg && zip -r "../$ZIP_NAME" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Auto Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
