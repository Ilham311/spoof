name: Build Ternak v5.0

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          add-to-path: false

      - name: Fetch zygisk.hpp
        run: |
          curl -sSL https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp \
               -o jni/zygisk.hpp

      - name: Build for all ABIs
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            echo "==> Building $abi"
            cmake -B build/$abi \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$abi \
              -DANDROID_PLATFORM=android-26 \
              -DCMAKE_BUILD_TYPE=Release \
              -S jni
            cmake --build build/$abi --parallel
          done

      - name: Assemble module zip
        run: |
          mkdir -p pkg/zygisk pkg/bin

          # Zygisk .so per ABI (Zygisk framework expects <ABI>.so filename)
          cp build/arm64-v8a/libternak.so   pkg/zygisk/arm64-v8a.so
          cp build/armeabi-v7a/libternak.so pkg/zygisk/armeabi-v7a.so
          cp build/x86_64/libternak.so      pkg/zygisk/x86_64.so
          cp build/x86/libternak.so         pkg/zygisk/x86.so

          # ternakctl per ABI (customize.sh symlinks the right one)
          cp build/arm64-v8a/ternakctl   pkg/bin/ternakctl-arm64
          cp build/armeabi-v7a/ternakctl pkg/bin/ternakctl-arm
          cp build/x86_64/ternakctl      pkg/bin/ternakctl-x86_64
          cp build/x86/ternakctl         pkg/bin/ternakctl-x86

          # Shell + install config + JSON pool
          cp module.prop action.sh service.sh customize.sh pool.json pkg/

          # resetprop-rs prebuilt (drop manual dari release upstream ke prebuilt/)
          if [ -f prebuilt/resetprop-rs ]; then
            cp prebuilt/resetprop-rs pkg/bin/
            chmod +x pkg/bin/resetprop-rs
          else
            echo "! WARNING: prebuilt/resetprop-rs missing — zip akan tanpa resetprop"
          fi

          cd pkg && zip -r ../ternak-v5.0.0-pure-zygisk.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ternak-v5.0.0-pure-zygisk
          path: ternak-v5.0.0-pure-zygisk.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ternak-v5.0.0-pure-zygisk.zip
          generate_release_notes: true
