name: build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          local-cache: true

      - name: Install ninja
        run: sudo apt-get install -y ninja-build

      - name: Build Zygisk (4 ABI)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        working-directory: sources
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify SO output
        run: |
          ls -lh module/zygisk/
          file module/zygisk/*.so

      - name: Pack merged module zip
        run: |
          cd module
          zip -r ../ternak_device_changer-${{ github.sha }}.zip .
          cd ..
          ls -lh ternak_device_changer-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ternak_device_changer
          path: ternak_device_changer-*.zip
          retention-days: 30

      - name: Publish release (only on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ternak_device_changer-*.zip
          generate_release_notes: true